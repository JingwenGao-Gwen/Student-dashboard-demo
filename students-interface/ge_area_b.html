<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GE Area B Courses</title>
<link rel="icon" type="image/png" href="../assets/Image_20260513001106_704_33.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#0070e0;--bg:#f5f4f9;--surface:#fff;--border:#e2e5ed;--text:#1a1d2e;--text2:#5a6076;--text3:#9198b0;--accent:#2171b5}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.topnav{background:var(--purple);display:flex;align-items:center;height:52px;padding:0 24px;gap:16px}
.topnav a,.topnav span{color:rgba(255,255,255,.82);text-decoration:none;font-size:13px;font-weight:700}
.topnav .logo{color:#fff;font-size:15px;font-weight:900}
.nav-spacer{flex:1}
.lang-toggle{display:inline-flex;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:20px;overflow:hidden}
.lang-btn{padding:5px 12px;border:0;background:transparent;color:rgba(255,255,255,.72);font-size:11.5px;font-weight:800;cursor:pointer}
.lang-btn.active{background:rgba(255,255,255,.24);color:#fff}
.wrap{max-width:1180px;margin:32px auto;padding:0 24px}
.hero{margin-bottom:18px}
.hero h1{font-size:32px;font-weight:950;letter-spacing:0;line-height:1.1;color:var(--accent);margin-bottom:8px}
.hero p{font-size:14px;color:var(--text2);max-width:760px}
.toolbar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.toolbar input{flex:1;min-width:0;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);font-size:13px;outline:none}
.toolbar input:focus{border-color:var(--accent)}
.count{font-size:12px;font-weight:800;color:var(--text3);white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.course{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;min-height:128px;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;flex-direction:column;gap:8px}
.course:hover{border-color:rgba(33,113,181,.45);box-shadow:0 6px 16px rgba(33,113,181,.10)}
.code{font-size:15px;font-weight:950;color:var(--accent);text-decoration:none}
.code:hover{text-decoration:underline}
.title{font-size:14px;font-weight:750;color:var(--text);line-height:1.35}
.meta{margin-top:auto;display:flex;gap:6px;flex-wrap:wrap}
.pill{display:inline-flex;border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;color:var(--text2);background:var(--bg)}
.pill.ok{color:#0f766e;background:#ecfdf5;border-color:#99f6e4}
.availability-section{margin-bottom:22px}
.section-head{display:flex;align-items:center;gap:10px;margin:8px 0 12px;font-size:13px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.section-head::after{content:"";height:1px;background:var(--border);flex:1}
.empty{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;text-align:center;color:var(--text3);font-weight:700}
@media(max-width:700px){.wrap{padding:0 14px;margin:20px auto}.toolbar{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}.hero h1{font-size:26px}}
</style>
</head>
<body data-area="GEB">
<nav class="topnav">
  <span class="logo">Study Dashboard</span>
  <a href="student_dashboard_index.html">&larr; Back</a>
  <div class="nav-spacer"></div>
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="zh-CN">&#31616;&#20013;</button>
    <button class="lang-btn" data-lang="zh-TW">&#32321;&#20013;</button>
  </div>
</nav>
<main class="wrap">
  <section class="hero">
    <h1 id="page-title">GE Area B Courses</h1>
    <p id="page-sub">Nature, Science and Technology. Choose any eligible course in this area to satisfy the GE Area B requirement.</p>
  </section>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search course code or title..."/>
    <div class="count" id="count">0 courses</div>
  </div>
  <div id="course-grid"></div>
</main>
<script>
const REMOTE_API_BASE = 'https://student-dashboard-demo.onrender.com';
const API_BASE = window.location.protocol === 'file:'
  ? 'http://localhost:8080'
  : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : REMOTE_API_BASE);
const AREA = document.body.dataset.area;
const AREA_META = {
  GEB:{
    en:['GE Area B Courses','Nature, Science and Technology. Choose any eligible course in this area to satisfy the GE Area B requirement.'],
    'zh-CN':['GE B \u8303\u56f4\u8bfe\u7a0b','\u81ea\u7136\u3001\u79d1\u5b66\u4e0e\u79d1\u6280\u3002\u4fee\u8bfb\u8be5\u8303\u56f4\u4efb\u610f\u7b26\u5408\u8981\u6c42\u8bfe\u7a0b\u5373\u53ef\u6ee1\u8db3 GE Area B \u8981\u6c42\u3002'],
    'zh-TW':['GE B \u7bc4\u570d\u8ab2\u7a0b','\u81ea\u7136\u3001\u79d1\u5b78\u8207\u79d1\u6280\u3002\u4fee\u8b80\u8a72\u7bc4\u570d\u4efb\u610f\u7b26\u5408\u8981\u6c42\u8ab2\u7a0b\u5373\u53ef\u6eff\u8db3 GE Area B \u8981\u6c42\u3002']
  },
  GEC:{
    en:['GE Area C Courses','Society and Culture. Choose any eligible course in this area to satisfy the GE Area C requirement.'],
    'zh-CN':['GE C \u8303\u56f4\u8bfe\u7a0b','\u793e\u4f1a\u4e0e\u6587\u5316\u3002\u4fee\u8bfb\u8be5\u8303\u56f4\u4efb\u610f\u7b26\u5408\u8981\u6c42\u8bfe\u7a0b\u5373\u53ef\u6ee1\u8db3 GE Area C \u8981\u6c42\u3002'],
    'zh-TW':['GE C \u7bc4\u570d\u8ab2\u7a0b','\u793e\u6703\u8207\u6587\u5316\u3002\u4fee\u8b80\u8a72\u7bc4\u570d\u4efb\u610f\u7b26\u5408\u8981\u6c42\u8ab2\u7a0b\u5373\u53ef\u6eff\u8db3 GE Area C \u8981\u6c42\u3002']
  },
  GED:{
    en:['GE Area D Courses','Self and Humanity. Choose any eligible course in this area to satisfy the GE Area D requirement.'],
    'zh-CN':['GE D \u8303\u56f4\u8bfe\u7a0b','\u81ea\u6211\u4e0e\u4eba\u6587\u3002\u4fee\u8bfb\u8be5\u8303\u56f4\u4efb\u610f\u7b26\u5408\u8981\u6c42\u8bfe\u7a0b\u5373\u53ef\u6ee1\u8db3 GE Area D \u8981\u6c42\u3002'],
    'zh-TW':['GE D \u7bc4\u570d\u8ab2\u7a0b','\u81ea\u6211\u8207\u4eba\u6587\u3002\u4fee\u8b80\u8a72\u7bc4\u570d\u4efb\u610f\u7b26\u5408\u8981\u6c42\u8ab2\u7a0b\u5373\u53ef\u6eff\u8db3 GE Area D \u8981\u6c42\u3002']
  }
};
let courses = [];
let lang = 'en';
try{ lang = localStorage.getItem('cuhksz_lang') || 'en'; }catch(e){}
if (!AREA_META[AREA] || !AREA_META[AREA][lang]) lang = 'en';
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function compact(code){return String(code||'').replace(/\s+/g,'').toUpperCase()}
function title(c){if(lang==='zh-CN')return c.title_zh_cn||c.title_zh_tw||c.title_en||c.title||c.code;if(lang==='zh-TW')return c.title_zh_tw||c.title_zh_cn||c.title_en||c.title||c.code;return c.title_en||c.title||c.code}
function textFor(key){
  const dict = {
    search:{en:'Search course code or title...', 'zh-CN':'\u641c\u7d22\u8bfe\u7a0b\u4ee3\u7801\u6216\u6807\u9898...', 'zh-TW':'\u641c\u7d22\u8ab2\u7a0b\u4ee3\u78bc\u6216\u6a19\u984c...'},
    noCourses:{en:'No courses found.', 'zh-CN':'\u672a\u627e\u5230\u8bfe\u7a0b\u3002', 'zh-TW':'\u672a\u627e\u5230\u8ab2\u7a0b\u3002'},
    syllabusMissing:{en:'The syllabus for this course has not been provided yet.', 'zh-CN':'\u8be5\u8bfe\u7a0b syllabus \u5c1a\u672a\u63d0\u4f9b\u3002', 'zh-TW':'\u8a72\u8ab2\u7a0b syllabus \u5c1a\u672a\u63d0\u4f9b\u3002'},
    available:{en:'Syllabus available', 'zh-CN':'\u53ef\u67e5\u770b syllabus', 'zh-TW':'\u53ef\u67e5\u770b syllabus'},
    unavailable:{en:'No syllabus yet', 'zh-CN':'\u6682\u65e0 syllabus', 'zh-TW':'\u66ab\u7121 syllabus'},
    units:{en:'units', 'zh-CN':'\u5b66\u5206', 'zh-TW':'\u5b78\u5206'},
    countSuffix:{en:'courses', 'zh-CN':'\u95e8\u8bfe\u7a0b', 'zh-TW':'\u9580\u8ab2\u7a0b'}
  };
  return (dict[key] && (dict[key][lang] || dict[key].en)) || key;
}
function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  const meta = AREA_META[AREA][lang] || AREA_META[AREA].en;
  document.getElementById('page-title').textContent = meta[0];
  document.getElementById('page-sub').textContent = meta[1];
  document.getElementById('search').placeholder = textFor('search');
  render();
}
function courseHref(c){return c.has_outline ? `course_detail.html?code=${encodeURIComponent(c.code)}` : '#'}
function handleCourseClick(e, c){
  if (c.has_outline) return;
  e.preventDefault();
  alert(textFor('syllabusMissing'));
}
function availabilityLabel(available){return available ? textFor('available') : textFor('unavailable')}
function availabilityHeading(available, count){return `${availabilityLabel(available)} \u00b7 ${count} ${textFor('countSuffix')}`}
function matchesArea(c){
  const code = compact(c.code || c.raw_code);
  if (code.startsWith(AREA)) return true;
  const fields = [
    c.ge_area, c.ucore_area, c.u_core_area, c.general_education_area,
    c.area, c.category, c.requirement, c.ucore_category, c.core_area
  ].map(v => compact(v));
  return fields.some(v => v === AREA || v.includes(AREA));
}
function courseCard(c){
  const available = !!c.has_outline;
  return `<article class="course">
      <a class="code" href="${courseHref(c)}" data-code="${esc(c.code)}">${esc(compact(c.code))}</a>
      <div class="title">${esc(title(c))}</div>
      <div class="meta">
        <span class="pill">${esc(c.units || c.credit || 3)} ${textFor('units')}</span>
        <span class="pill ${available ? 'ok' : ''}">${availabilityLabel(available)}</span>
      </div>
    </article>`;
}
function render(){
  const q = String(document.getElementById('search').value||'').trim().toLowerCase();
  const visible = courses.filter(c => !q || compact(c.code).toLowerCase().includes(q) || title(c).toLowerCase().includes(q));
  document.getElementById('count').textContent = `${visible.length} ${textFor('countSuffix')}`;
  const groups = [
    {available:true, rows:visible.filter(c => c.has_outline)},
    {available:false, rows:visible.filter(c => !c.has_outline)}
  ].filter(g => g.rows.length);
  document.getElementById('course-grid').innerHTML = groups.length ? groups.map(g => `
    <section class="availability-section">
      <div class="section-head"><span>${availabilityHeading(g.available, g.rows.length)}</span></div>
      <div class="grid">${g.rows.map(courseCard).join('')}</div>
    </section>`).join('') : `<div class="empty">${textFor('noCourses')}</div>`;
  document.querySelectorAll('.course .code').forEach(a => {
    const c = visible.find(x => x.code === a.dataset.code);
    if (c) a.addEventListener('click', e => handleCourseClick(e, c));
  });
}
async function load(){
  const res = await fetch(API_BASE + '/api/courses', {cache:'no-store'});
  if (!res.ok) throw new Error('Failed to load courses.');
  const payload = await res.json();
  courses = (payload.courses || []).filter(matchesArea).sort((a,b)=>compact(a.code).localeCompare(compact(b.code)));
  applyLang();
}
document.getElementById('search').addEventListener('input', render);
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => {lang=b.dataset.lang; try{localStorage.setItem('cuhksz_lang', lang)}catch(e){}; applyLang();}));
load().catch(err => {document.getElementById('course-grid').innerHTML = `<div class="empty">${esc(err.message)}</div>`});
</script>
</body>
</html>
