<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Course Detail</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#0070e0;--bg:#f5f4f9;--surface:#fff;--border:#e2e5ed;
  --text:#1a1d2e;--text2:#5a6076;--text3:#9198b0;
  --radius:12px;--accent:#2171b5;
  --b1:#eff3ff;--b2:#bdd7e7;--b3:#6baed6;--b4:#2171b5;
  --mt1-bg:#eff3ff;--mt1-fg:#1e3a8a;
  --mt2-bg:#bdd7e7;--mt2-fg:#1e40af;
  --mt3-bg:#6baed6;--mt3-fg:#0c4a6e;
  --mt4-bg:#2171b5;--mt4-fg:#ffffff;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
     background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.topnav{background:var(--purple);display:flex;align-items:center;height:52px;padding:0 24px;gap:16px}
.topnav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:600}
.topnav a:hover{color:#fff}
.topnav .logo{color:#fff;font-weight:800;font-size:15px}
.nav-spacer{flex:1}
.user-pill{display:flex;align-items:center;gap:8px;color:#fff;font-size:12px;background:rgba(255,255,255,.12);padding:5px 10px;border-radius:20px}
.user-pill .ub{cursor:pointer;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700}
.user-pill .ub:hover{background:rgba(255,255,255,.35)}
.container{max-width:1180px;margin:32px auto;padding:0 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* Header */
.course-header{margin-bottom:24px}
.course-code{font-size:32px;font-weight:900;color:var(--accent);letter-spacing:-.02em;line-height:1.1}
.course-title{font-size:18px;color:var(--text);font-weight:600;margin-top:6px;line-height:1.3}
/* Meta row */
.meta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.meta-tag{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;
  font-size:12.5px;font-weight:700;background:var(--bg);border:1px solid var(--border)}
.meta-tag .dot{width:9px;height:9px;border-radius:50%}
/* Section */
.section{margin-top:28px}
.section h2{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--text);
  padding-bottom:8px;border-bottom:2px solid var(--accent);display:inline-block}
.text-block{white-space:pre-wrap;color:#374151;font-size:14px;line-height:1.75}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.detail-grid div{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;min-width:0}
.detail-grid span{display:block;color:var(--text3);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.detail-grid strong{display:block;color:var(--text);font-size:13px;font-weight:700;word-break:break-word}
.data-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.data-table th,.data-table td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.data-table th{background:var(--bg);color:var(--text2);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.data-table tr:last-child td{border-bottom:none}
.data-table td:last-child{font-weight:800;color:var(--accent);white-space:nowrap}
.term-layout{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:18px;align-items:start}
.term-timeline{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:#fff;padding:14px}
.term-track{display:grid;grid-auto-flow:column;grid-auto-columns:92px;gap:8px;min-height:112px;align-items:stretch}
.term-node{border:1px solid var(--border);border-radius:10px;background:var(--bg);padding:8px 6px;text-align:center;color:var(--text3);font-size:11px;font-weight:800;display:flex;flex-direction:column;justify-content:center;gap:4px}
.term-node .year{font-size:10px;color:var(--text3)}
.term-node .term{font-size:12px;color:var(--text2)}
.term-node.on{background:#e8f1fb;border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(33,113,181,.12) inset}
.term-node.on .term,.term-node.on .year{color:var(--accent)}
.term-list{border:1px solid var(--border);border-radius:12px;background:#fff;max-height:220px;overflow-y:auto;padding:10px}
.term-list-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.term-list-item{padding:7px 9px;border-radius:8px;background:var(--bg);font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.muted-note{color:var(--text3);font-size:12px;margin-top:8px}
.course-competency-card{border:1px solid var(--border);border-radius:14px;background:linear-gradient(180deg,#fff,#f8fbff);padding:22px;margin-top:10px}
.course-competency-intro{text-align:center;margin-bottom:18px}
.course-competency-intro h3{font-size:22px;font-weight:800;margin-bottom:8px;color:var(--text)}
.course-competency-intro p{font-size:13px;color:var(--text2);max-width:780px;margin:0 auto;line-height:1.55}
.course-competency-cloud{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;min-height:170px}
.course-competency-chip{display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:1px solid rgba(33,113,181,.28);background:#fff;color:#12385f;border-radius:999px;padding:8px 13px;font-weight:850;line-height:1.2;box-shadow:0 3px 12px rgba(33,113,181,.08);transition:transform .15s,border-color .15s,box-shadow .15s,background .15s}
.course-competency-chip:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 18px rgba(33,113,181,.16);background:#f8fbff}
.course-competency-score{font-size:11px;font-weight:900;color:#fff;background:var(--accent);border-radius:999px;padding:2px 7px;white-space:nowrap}
/* Outcome */
.outcome-list{padding-left:20px;line-height:1.9;color:#374151}
.outcome-list li{margin-bottom:4px;font-size:14px}
/* Score rows */
.score-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.score-lbl{font-size:13px;font-weight:700;color:var(--text);width:220px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-id{display:inline-block;width:32px;font-weight:900;color:var(--accent);font-size:12px}
.score-bar-bg{flex:1;height:12px;position:relative;border-radius:6px;overflow:hidden;
  background:linear-gradient(90deg, var(--b1) 0% 25%, var(--b2) 25% 50%, var(--b3) 50% 75%, var(--b4) 75% 100%);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.score-bar-fill{position:absolute;left:0;top:0;height:100%;width:0;border-radius:6px;transition:width .4s ease}
.score-val{font-size:14px;font-weight:800;color:var(--accent);min-width:34px;text-align:right}
.maturity-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;min-width:68px;text-align:center}
/* Not found */
.not-found{text-align:center;padding:60px 20px;color:var(--text3)}
.not-found .icon{font-size:48px;margin-bottom:16px}
.back-link{display:inline-flex;align-items:center;gap:6px;margin-top:20px;color:var(--accent);font-weight:700;text-decoration:none;font-size:13px}
.back-link:hover{text-decoration:underline}
/* Comments */
.comments-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.comments-card h2{font-size:17px;font-weight:800;margin-bottom:18px}
.comment-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.comment-item:last-child{border-bottom:none}
.comment-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.comment-body{flex:1;min-width:0}
.comment-meta{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.comment-author{font-size:13px;font-weight:700;color:var(--text)}
.comment-time{font-size:11px;color:var(--text3)}
.comment-text{font-size:13.5px;color:var(--text2);line-height:1.5;word-break:break-word}
.comment-form{display:flex;gap:10px;margin-top:18px;align-items:flex-start}
.comment-form input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:var(--bg);outline:none}
.comment-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(33,113,181,.1)}
.comment-form .btn-send{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.comment-form .btn-send:hover{background:#1a5fa0;transform:translateY(-1px)}
.comment-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px;margin-left:auto;flex-shrink:0}
.comment-del:hover{color:#dc2626}
.comments-empty{text-align:center;color:var(--text3);font-size:13px;padding:20px 0}
/* Responsive */
@media(max-width:600px){
  .container{padding:0 12px;margin:16px auto}
  .card{padding:20px}
  .course-code{font-size:24px}
  .detail-grid{grid-template-columns:1fr}
  .term-layout{grid-template-columns:1fr}
  .score-lbl{width:140px;font-size:11px}
}
</style>
</head>
<body>
<nav class="topnav">
  <span class="logo">📖 Course Detail</span>
  <a href="student_dashboard_index.html">← Back to Dashboard</a>
  <div class="nav-spacer"></div>
  <div class="user-pill" id="user-pill" style="display:none">
    <span id="user-name">Student</span>
    <button class="ub" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="container">
  <div class="card" id="content"></div>
  <div class="comments-card" id="comments-card">
    <h2>💬 Discussion</h2>
    <div id="comments-list"></div>
    <div class="comment-form">
      <input type="text" id="comment-input" placeholder="Share your thoughts about this course..." maxlength="500"/>
      <button class="btn-send" id="comment-send">Send</button>
    </div>
  </div>
</div>

<script src="competency_data.js"></script>
<script>
const API_BASE = window.location.protocol === 'file:'
  ? 'http://localhost:8080'
  : (window.location.hostname.endsWith('netlify.app') ? 'https://student-dashboard-demo.onrender.com' : '');
const params = new URLSearchParams(window.location.search);
const code = params.get('code') || '';
const contentEl = document.getElementById('content');
const codeKey = value => String(value || '').replace(/\s+/g, '').toUpperCase();
const I18N = {
  en: {pageTitle:'Course Detail', back:'Back to Course Browser', loading:'Loading course...', notFound:'Course Not Found', missing:'No course matched this code.', loadError:'Could not load this course from the API.', subject:'Subject', units:'Units', level:'Level', outline:'Outline', outlineOk:'SIS outline available', info:'Course Information', academicOrg:'Academic Org', gradeType:'Grade Type', description:'Description', prerequisites:'Prerequisites', coReq:'Co-requisites', outcomes:'Learning Outcomes', syllabus:'Course Syllabus', assessment:'Assessment Scheme', components:'Course Components', terms:'Offered Terms', item:'Item', value:'Value', component:'Component', hours:'Hours', timeline:'Timeline', offeredList:'All Offered Terms', note:'Highlighted nodes show terms when this course was offered.', term1:'Term 1', term2:'Term 2', summer:'Summer'},
  'zh-CN': {pageTitle:'课程详细信息', back:'返回 浏览课程目录', loading:'正在载入课程...', notFound:'未找到课程', missing:'没有匹配该代码的课程。', loadError:'无法从 API 载入课程。', subject:'科目', units:'学分', level:'级别', outline:'大纲', outlineOk:'已有 SIS 课程大纲', info:'课程信息', academicOrg:'Academic Org', gradeType:'成绩类型', description:'课程描述', prerequisites:'先修要求', coReq:'并修要求', outcomes:'学习成果', syllabus:'课程大纲', assessment:'考核方案', components:'课程组件', terms:'开课学期', item:'项目', value:'数值', component:'组件', hours:'学时', timeline:'时间轴', offeredList:'全部开课记录', note:'高亮节点表示该课程曾在对应学期开设。', term1:'Term 1', term2:'Term 2', summer:'Summer'},
  'zh-TW': {pageTitle:'課程詳細資訊', back:'返回 瀏覽課程目錄', loading:'正在載入課程...', notFound:'未找到課程', missing:'沒有匹配該代碼的課程。', loadError:'無法從 API 載入課程。', subject:'科目', units:'學分', level:'級別', outline:'大綱', outlineOk:'已有 SIS 課程大綱', info:'課程資訊', academicOrg:'Academic Org', gradeType:'成績類型', description:'課程描述', prerequisites:'先修要求', coReq:'並修要求', outcomes:'學習成果', syllabus:'課程大綱', assessment:'考核方案', components:'課程組件', terms:'開課學期', item:'項目', value:'數值', component:'組件', hours:'學時', timeline:'時間軸', offeredList:'全部開課記錄', note:'高亮節點表示該課程曾在對應學期開設。', term1:'Term 1', term2:'Term 2', summer:'Summer'}
};
let LANG = 'en';
try { LANG = localStorage.getItem('cuhksz_lang') || 'en'; } catch(e){}
if (!I18N[LANG]) LANG = 'en';
document.documentElement.lang = LANG;

function esc(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function t(key){ return I18N[LANG][key] || I18N.en[key] || key; }
function valueOrDash(v){ return v == null || String(v).trim() === '' ? '-' : esc(v); }
function meta(label, value){
  if (value == null || String(value).trim() === '') return '';
  return `<span class="meta-tag"><strong>${esc(label)}</strong> ${esc(value)}</span>`;
}
function localText(enValue, zhValue){ return LANG === 'en' ? (enValue || zhValue || '') : (zhValue || enValue || ''); }
function courseTitle(course){
  if (LANG === 'zh-CN') return course.title_zh_cn || course.title_zh_tw || course.title_en || course.title || course.code;
  if (LANG === 'zh-TW') return course.title_zh_tw || course.title_zh_cn || course.title_en || course.title || course.code;
  return course.title_en || course.code;
}
const ORG_BY_SUBJECT = {
  AIE:'SAI',
  AIR:'SDS', CSC:'SDS', DDA:'SDS', MDS:'SDS', MFE:'SDS', RMS:'SDS', STA:'SDS',
  ACT:'SME', DMS:'SME', ECO:'SME', FEMBA:'SME', FEX:'SME', FIN:'SME', IBA:'SME', IDE:'SME', MBM:'SME', MGT:'SME', MIS:'SME', MKT:'SME',
  BIM:'MED', BIO:'MED', BME:'MED', MED:'MED', PHM:'MED',
  MUS:'MUS',
  CHM:'SSE', CIE:'SSE', ECE:'SSE', EIE:'SSE', ENE:'SSE', ERG:'SSE', FMA:'SSE', FTE:'SSE', ICS:'SSE', MAT:'SSE', MCE:'SSE', MFM:'SSE', MSE:'SSE', PHY:'SSE', SSE:'SSE',
  CEC:'HSS', CHI:'HSS', CLC:'HSS', CSS:'HSS', DAI:'HSS', ENB:'HSS', ENG:'HSS', ENL:'HSS', FRN:'HSS', GEA:'HSS', GEB:'HSS', GEC:'HSS', GED:'HSS', GEW:'HSS', GFH:'HSS', GFN:'HSS', GGE:'HSS', GLB:'HSS', HSS:'HSS', ITE:'HSS', JPN:'HSS', KOR:'HSS', LIT:'HSS', PED:'HSS', PSY:'HSS', PUB:'HSS', SPN:'HSS', SUD:'HSS', TRA:'HSS', URB:'HSS', URM:'HSS'
};
function academicOrg(course){
  const text = String(course.academic_org || '').trim();
  if (/^(SDS|SME|SSE|MED|MUS|HSS|SAI)$/.test(text)) return text;
  return ORG_BY_SUBJECT[course.subject_code || course.dept] || '';
}
async function hydrateCourseTitle(course){
  if (course.title_en && course.title_en !== course.code && codeKey(course.title_en) !== codeKey(course.code)) return course;
  try {
    const res = await fetch(API_BASE + '/api/courses', {cache:'no-store'});
    if (!res.ok) return course;
    const payload = await res.json();
    const found = (payload.courses || []).find(c => codeKey(c.code) === codeKey(course.code) || codeKey(c.raw_code) === codeKey(course.code));
    if (found && found.title_en && codeKey(found.title_en) !== codeKey(found.code)){
      course.title_en = found.title_en;
      course.title_zh_cn = course.title_zh_cn || found.title_zh_cn;
      course.title_zh_tw = course.title_zh_tw || found.title_zh_tw;
    }
  } catch(err){}
  return course;
}
function textSection(title, value){
  if (value == null || String(value).trim() === '') return '';
  return `<div class="section"><h2>${esc(title)}</h2><div class="text-block">${esc(value)}</div></div>`;
}
function parseTableRows(value){
  return String(value || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean).map(line => {
    const parts = line.includes('|') ? line.split('|') : line.split(/\t+/);
    return parts.map(x => x.trim()).filter(Boolean);
  }).filter(parts => parts.length);
}
function tableSection(title, value, firstHeader, secondHeader){
  const rows = parseTableRows(value);
  if (!rows.length) return '';
  return `<div class="section"><h2>${esc(title)}</h2><table class="data-table"><thead><tr><th>${esc(firstHeader)}</th><th>${esc(secondHeader)}</th></tr></thead><tbody>${rows.map(parts => `<tr><td>${esc(parts[0] || '')}</td><td>${esc(parts.slice(1).join(' | ') || '-')}</td></tr>`).join('')}</tbody></table></div>`;
}
function parseOfferedTerms(value){
  return String(value || '').split(/\r?\n/).map(x => x.trim()).filter(Boolean).map(text => {
    const m = text.match(/(\d{4})-(\d{2})\s+(Term\s+1|Term\s+2|Summer)/i);
    if (!m) return {text, key:text};
    const year = `${m[1]}-${m[2]}`;
    const term = m[3].replace(/\s+/g, ' ');
    return {text, year, term, key:`${year} ${term}`};
  });
}
function buildTimelineTerms(offered){
  const years = offered.map(x => x.year).filter(Boolean);
  let lastStart = 2025;
  years.forEach(y => { const n = Number(y.slice(0,4)); if (Number.isFinite(n) && n > lastStart) lastStart = n; });
  const all = [];
  for (let start = 2014; start <= lastStart; start++){
    const year = `${start}-${String((start + 1) % 100).padStart(2,'0')}`;
    ['Term 1','Term 2','Summer'].forEach(term => all.push({year, term, key:`${year} ${term}`}));
  }
  return all;
}
function termLabel(term){ return term === 'Term 1' ? t('term1') : (term === 'Term 2' ? t('term2') : t('summer')); }
function termsSection(course){
  const offered = parseOfferedTerms(course.offered_terms);
  if (!offered.length) return '';
  const offeredSet = new Set(offered.map(x => x.key));
  const timeline = buildTimelineTerms(offered);
  return `<div class="section"><h2>${esc(t('terms'))}</h2><div class="term-layout"><div><div class="term-timeline" aria-label="${esc(t('timeline'))}"><div class="term-track">${timeline.map(x => `<div class="term-node ${offeredSet.has(x.key) ? 'on' : ''}"><span class="year">${esc(x.year)}</span><span class="term">${esc(termLabel(x.term))}</span></div>`).join('')}</div></div><div class="muted-note">${esc(t('note'))}</div></div><div class="term-list"><div class="term-list-title">${esc(t('offeredList'))}</div>${offered.map(x => `<div class="term-list-item">${esc(x.text)}</div>`).join('')}</div></div></div>`;
}
function compactCode(value){ return String(value || '').replace(/\s+/g,'').toUpperCase(); }
function competencySection(course){
  const data = window.COMPETENCY_DATA || {};
  const record = data.courses && data.courses[compactCode(course.code)];
  const scores = record && Array.isArray(record.scores) ? record.scores.filter(x => Number(x.score) > 0) : [];
  if (!scores.length) return '';
  const chips = scores.map(row => {
    const score = Number(row.score || 0);
    const size = Math.max(12, Math.min(24, 12 + score * 1.2));
    const href = `student_dashboard_index.html?competency=${encodeURIComponent(row.item)}${row.abbr ? `&competencySchool=${encodeURIComponent(row.abbr)}` : ''}#section-competency-pool`;
    return `<a class="course-competency-chip" href="${href}" style="font-size:${size}px" title="${esc((row.level ? row.level + ' - ' : '') + score.toFixed(1) + '/10' + (row.rationale ? ': ' + row.rationale : ''))}">
      <span>${esc(row.item)}</span><span class="course-competency-score">${score.toFixed(1)}</span>
    </a>`;
  }).join('');
  return `<div class="section"><h2>Course competencies</h2><div class="course-competency-card"><div class="course-competency-intro"><h3>Course competencies</h3><p>All positive competency matches for this course. Size follows relevance score; hover to see the exact score and rationale, or click through to the school competency pool.</p></div><div class="course-competency-cloud">${chips}</div></div></div>`;
}
function statusText(course){ return course.has_outline ? t('outlineOk') : ''; }
function applyChromeText(){
  document.querySelector('.logo').textContent = t('pageTitle');
  document.querySelector('.topnav a').textContent = t('back');
}
function renderNotFound(message){
  contentEl.innerHTML = `<div class="not-found"><div class="icon">!</div><h2>${esc(t('notFound'))}</h2><p style="margin-top:8px;color:var(--text2)">${esc(message || t('missing'))}</p><a class="back-link" href="student_dashboard_index.html">${esc(t('back'))}</a></div>`;
}
function renderCourse(course){
  const units = course.units || course.credit || '-';
  const title = courseTitle(course);
  const description = localText(course.description_english || course.description || course.detail_description, course.description_chinese);
  document.title = `${course.code} - ${title || t('pageTitle')}`;
  applyChromeText();
  contentEl.innerHTML = `<div class="course-header"><div class="course-code">${esc(course.code)}</div><div class="course-title">${esc(title || '')}</div><div class="meta-row">${meta(t('subject'), course.subject_code || course.dept)}${meta(t('units'), units)}${meta(t('level'), course.level)}${statusText(course) ? meta(t('outline'), statusText(course)) : ''}</div></div><div class="section"><h2>${esc(t('info'))}</h2><div class="detail-grid"><div><span>${esc(t('academicOrg'))}</span><strong>${valueOrDash(academicOrg(course))}</strong></div><div><span>${esc(t('gradeType'))}</span><strong>${valueOrDash(course.grade_type)}</strong></div></div></div>${textSection(t('description'), description)}${textSection(t('prerequisites'), course.prerequisites)}${textSection(t('coReq'), course.co_requisites)}${textSection(t('outcomes'), course.learning_outcomes || course.outcome)}${textSection(t('syllabus'), course.course_syllabus || course.syllabus)}${tableSection(t('assessment'), course.assessment_scheme || course.assessment, t('item'), t('value'))}${tableSection(t('components'), course.course_components, t('component'), t('hours'))}${termsSection(course)}${competencySection(course)}<div style="margin-top:32px;text-align:center"><a class="back-link" href="student_dashboard_index.html">${esc(t('back'))}</a></div>`;
}
async function loadCourse(){
  applyChromeText();
  if (!code){ renderNotFound(); return; }
  contentEl.innerHTML = `<div class="not-found"><div class="icon">...</div><h2>${esc(t('loading'))}</h2></div>`;
  try {
    const res = await fetch(API_BASE + '/api/courses/' + encodeURIComponent(code), {cache:'no-store'});
    if (res.status === 404){ renderNotFound(); return; }
    if (!res.ok) throw new Error('API error ' + res.status);
    renderCourse(await hydrateCourseTitle(await res.json()));
  } catch(err){
    console.error(err);
    renderNotFound(t('loadError'));
  }
}
loadCourse();
</script><script>
// ── Comments ──
var STORAGE_KEY = 'course_comments_' + code.replace(/\s+/g, '_');
function getCurrentUser(){
  try {
    var s = JSON.parse(localStorage.getItem('cuhksz_session') || 'null');
    return (s && s.name) ? s.name : null;
  } catch(e){ return null; }
}
function loadComments(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e){ return []; }
}
function saveComments(comments){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
}
function renderComments(){
  var comments = loadComments();
  var list = document.getElementById('comments-list');
  var currentUser = getCurrentUser();
  if (!comments.length){
    list.innerHTML = '<div class="comments-empty">No comments yet. Be the first to share your thoughts!</div>';
    return;
  }
  list.innerHTML = comments.map(function(c, i){
    var initials = (c.name || 'User').split(/\s+/).map(function(s){return s[0];}).join('').slice(0,2).toUpperCase();
    var isOwner = currentUser && c.name === currentUser;
    return '<div class="comment-item">' +
      '<div class="comment-avatar">' + initials + '</div>' +
      '<div class="comment-body">' +
        '<div class="comment-meta">' +
          '<span class="comment-author">' + (c.name || 'User').replace(/</g,'&lt;') + '</span>' +
          '<span class="comment-time">' + (c.time || '') + '</span>' +
        '</div>' +
        '<div class="comment-text">' + c.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>' +
      '</div>' +
      (isOwner ? '<button class="comment-del" title="Delete my comment" data-idx="' + i + '">✕</button>' : '') +
    '</div>';
  }).join('');
  list.querySelectorAll('.comment-del').forEach(function(btn){
    btn.addEventListener('click', function(){
      var idx = parseInt(this.dataset.idx, 10);
      var c = loadComments();
      var user = getCurrentUser();
      if (!user || c[idx].name !== user) return;
      if (!confirm('Delete this comment? This action cannot be undone.')) return;
      c.splice(idx, 1);
      saveComments(c);
      renderComments();
    });
  });
}
function addComment(){
  var input = document.getElementById('comment-input');
  var text = input.value.trim();
  if (!text) return;
  // Get author name from session
  var name = 'Anonymous';
  try {
    var s = JSON.parse(localStorage.getItem('cuhksz_session') || 'null');
    if (s && s.name) name = s.name;
  } catch(e){}
  var now = new Date();
  var time = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');
  var comments = loadComments();
  comments.push({ name: name, text: text, time: time });
  saveComments(comments);
  input.value = '';
  renderComments();
}
document.getElementById('comment-send').addEventListener('click', addComment);
document.getElementById('comment-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') addComment();
});
renderComments();

function loadUser(){
  try {
    var s = JSON.parse(localStorage.getItem('cuhksz_session') || 'null');
    if (s && s.name){
      document.getElementById('user-pill').style.display = 'flex';
      document.getElementById('user-name').textContent = s.name;
    }
  } catch(e){}
}
function signOut(){
  if(!confirm('Sign out? Your portfolio is preserved on this device.')) return;
  localStorage.removeItem('cuhksz_session');
  location.href = 'login.html';
}
loadUser();
</script>
