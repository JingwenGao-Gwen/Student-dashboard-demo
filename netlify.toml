[build]
  command = "npm run frontend:build && node tools/prepare_netlify_publish.mjs"
  publish = "frontend/dist"

[build.environment]
  VITE_BASE_PATH = "/"

[[redirects]]
  from = "/"
  to = "/students-interface/student_dashboard_index.html"
  status = 302

[[redirects]]
  from = "/index.html"
  to = "/students-interface/student_dashboard_index.html"
  status = 302

[[redirects]]
  from = "/aa_dashboard.html"
  to = "/aa_dashboard.html"
  status = 200

[[redirects]]
  from = "/aa_dashboard"
  to = "/aa_dashboard.html"
  status = 200

[[redirects]]
  from = "/aa_dashboard_v2.html"
  to = "/aa_dashboard.html"
  status = 200

[[redirects]]
from = "/student_dashboard.html"
to = "/student_dashboard.html"
status = 200

[[redirects]]
  from = "/students-interface/*"
  to = "/students-interface/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://student-dashboard-demo.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
